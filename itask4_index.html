<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AmahjiCodec — Personal Blog</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       HEADER
  ══════════════════════════════════════════ -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <span class="header-tag">EST. 2024</span>
      </div>
      <div class="header-center">
        <h1 class="site-title">AmahjiCodec</h1>
        <p class="site-subtitle">thoughts · code · curiosity</p>
      </div>
      <div class="header-right">
        <nav class="header-nav">
          <a href="#">About</a>
          <a href="#">Archive</a>
          <a href="#">RSS</a>
        </nav>
      </div>
    </div>
    <div class="header-rule"></div>
  </header>

  <!-- ══════════════════════════════════════════
       HERO MARQUEE
  ══════════════════════════════════════════ -->
  <div class="marquee-wrapper" aria-hidden="true">
    <div class="marquee-track">
      <span>Tech</span><span class="dot">◆</span>
      <span>Travel</span><span class="dot">◆</span>
      <span>Food</span><span class="dot">◆</span>
      <span>Life</span><span class="dot">◆</span>
      <span>Code</span><span class="dot">◆</span>
      <span>Stories</span><span class="dot">◆</span>
      <span>Tech</span><span class="dot">◆</span>
      <span>Travel</span><span class="dot">◆</span>
      <span>Food</span><span class="dot">◆</span>
      <span>Life</span><span class="dot">◆</span>
      <span>Code</span><span class="dot">◆</span>
      <span>Stories</span><span class="dot">◆</span>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       CONTROLS — Search + Filter
  ══════════════════════════════════════════ -->
  <main class="main-content">
    <div class="controls-bar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input
          type="text"
          id="searchInput"
          placeholder="Search posts…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div class="filter-pills" id="filterPills">
        <button class="pill active" data-category="All">All</button>
        <button class="pill" data-category="Tech">Tech</button>
        <button class="pill" data-category="Travel">Travel</button>
        <button class="pill" data-category="Food">Food</button>
        <button class="pill" data-category="Life">Life</button>
      </div>
    </div>

    <!-- Results meta -->
    <div class="results-meta">
      <span id="resultsCount">Showing all posts</span>
    </div>

    <!-- ══════════════════════════════════════════
         BLOG GRID
    ══════════════════════════════════════════ -->
    <div class="blog-grid" id="blogGrid">
      <!-- Cards injected by app.js -->
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <p class="empty-icon">◈</p>
      <p class="empty-msg">No posts found. Try a different search or category.</p>
    </div>

    <!-- ══════════════════════════════════════════
         PAGINATION
    ══════════════════════════════════════════ -->
    <div class="pagination" id="pagination">
      <!-- Buttons injected by app.js -->
    </div>
  </main>

  <!-- ══════════════════════════════════════════
       FOOTER
  ══════════════════════════════════════════ -->
  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-brand">AmahjiCodec</p>
      <p class="footer-copy">© 2024 — Built with curiosity &amp; caffeine.</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
